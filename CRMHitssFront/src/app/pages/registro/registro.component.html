<div class="text-center mt-3 mb-5">
    <h1>Registrar cliente</h1>
</div>
<div class="container">
    <form [formGroup]="formulario" (ngSubmit)="guardar()">
        <div class="d-flex justify-content-center">
            <div class="d-flex">
                <label class="me-3">Nombre</label>
                <input class="form-control me-5" type="text" formControlName="Nombre" >
            </div>
            <div class="d-flex">
                <label class="me-3">Email</label>
                <input class="form-control" type="text" formControlName="Email" >
            </div>
        </div>
        <div class="d-flex justify-content-center">
            <div class="col-3 padding-nombre">
                <span *ngIf="nombreObligatorio" class="text-danger">
                    {{ mensaje }}
                </span>
            </div>
            <div class="col-4 padding-email">
                <span *ngIf="emailObligatorio" class="text-danger">
                    {{ mensaje }}
                </span>
            </div>
        </div>
        <div class="d-flex justify-content-center mt-4">
            <div class="d-flex">
                <label class="me-3">Teléfono</label>
                <input class="form-control me-5" type="text" formControlName="Telefono" >
            </div>
            <div class="d-flex">
                <label class="me-3">Nombre Finca</label>
                <input class="form-control" type="text" formControlName="NombreFinca" >
            </div>
        </div>
        <div class="d-flex justify-content-center">
            <div class="col-3 padding-telefono">
                <span *ngIf="telefonoObligatorio" class="text-danger">
                    {{ mensaje }}
                </span>
            </div>
            <div class="col-3 padding-nombre-finca">
                <span *ngIf="nombreFincaObligatorio" class="text-danger">
                    {{ mensaje }}
                </span>
            </div>
        </div>
        <div class="d-flex justify-content-center mt-4">
            <div class="d-flex">
                <label class="me-3">Hectáreas</label>
                <input class="form-control" type="text" formControlName="Hectareas" >
            </div>
        </div>
        <div class="d-flex justify-content-center">
            <div class="col-3 padding-hectareas">
                <span *ngIf="hectareasObligatorio" class="text-danger">
                    {{ mensaje }}
                </span>
            </div>
        </div>
        <div class="d-flex justify-content-center mt-4">
            <div class="me-3">
                <button class="btn btn-primary" type="submit">Guardar</button>
            </div>
            <div class="ms-3">
                <button class="btn btn-primary" (click)="cancelar()">Cancelar</button>
            </div>
        </div>
    </form>
</div>
